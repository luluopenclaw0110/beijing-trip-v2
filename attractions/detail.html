</head>
<body data-page="detail">
  
  <header class="header">
    <div class="container">
      <a href="../index.html" class="logo">
        <div class="logo-icon">🏯</div>

      <nav class="nav">

        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <line x1="3" y1="12" x2="21" y2="12"></line>

  <section class="detail-hero">
    <div class="detail-hero-bg"></div>
  </section>

  <section class="detail-content">
    <div class="container">
      <h1 class="detail-title" style="font-size: 2.5rem; margin-bottom: 30px; color: var(--primary);"></h1>
      
      <div class="detail-info">
        <!-- Rendered by JavaScript -->
      </div>
      
      <div class="detail-description">
        <!-- Rendered by JavaScript -->
      </div>
    </div>
  </section>

  <button class="favorite-btn">
    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/>
    </svg>

  <footer class="footer">
    <div class="container">
      <div class="footer-bottom">
        <p>© 2024 北京旅遊. All rights reserved.</p>
      </div>
    </div>
  </footer>

    <script>
    const spotsData = [
      {id: 'spot_01', name: '故宮紫禁城', location: '東城區景山前街4號', rating: 4.9, category: '宮殿', image: 'images/spots/spot_01_gugong.jpg', description: '明清兩代皇家宮殿，世界文化遺產', openTime: '08:30-17:00', ticket: '旺季60元', address: '北京市東城區景山前街4號'},
      {id: 'spot_02', name: '慕田峪長城', location: '北京市懷柔區', rating: 4.8, category: '古蹟', image: 'images/spots/spot_02_mutianyu.jpg', description: '北京著名長城，保存最完好', openTime: '07:30-18:00', ticket: '40元', address: '北京市懷柔區渤海鎮'},
      {id: 'spot_03', name: '頤和園', location: '北京市海淀區', rating: 4.8, category: '園林', image: 'images/spots/spot_03_yiheyuan.jpg', description: '清代皇家避暑行宮', openTime: '06:30-18:00', ticket: '30元', address: '北京市海淀區宮門前街19號'},
      {id: 'spot_04', name: '天壇', location: '北京市東城區', rating: 4.7, category: '寺廟', image: 'images/spots/spot_04_tiantan.jpg', description: '明清帝王祭天場所', openTime: '06:00-21:00', ticket: '15元', address: '北京市東城區天壇內東里7號'},
    ];

    document.addEventListener('DOMContentLoaded', function() {
      var params = new URLSearchParams(window.location.search);
      var id = params.get('id');
      var spot = spotsData.find(function(s) { return s.id === id; });
      if (spot) {
        document.querySelector('.detail-title').textContent = spot.name;
        document.querySelector('.detail-hero-bg').style.backgroundImage = 'url(' + spot.image + ')';
        document.querySelector('.detail-info').innerHTML = '<div class="info-box"><div class="info-box-label">開放時間</div><div class="info-box-value">' + spot.openTime + '</div></div><div class="info-box"><div class="info-box-label">門票</div><div class="info-box-value">' + spot.ticket + '</div></div><div class="info-box"><div class="info-box-label">地址</div><div class="info-box-value">' + spot.address + '</div></div><div class="info-box"><div class="info-box-label">評分</div><div class="info-box-value">⭐ ' + spot.rating + '</div></div>';
        document.querySelector('.detail-description').innerHTML = '<h3>關於 ' + spot.name + '</h3><p>' + spot.description + '</p>';
      }
    });
  </script>
</body>
