<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>北京烤鴨 - 北京旅遊</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      font-family: "Noto Sans TC", "Microsoft JhengHei", sans-serif;
      background: #f8f5f0;
      color: #333;
      line-height: 1.6;
    }
    .detail-hero {
      position: relative;
      height: 60vh;
      min-height: 400px;
      overflow: hidden;
    }
    .detail-hero-bg {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background-size: cover;
      background-position: center;
      filter: brightness(0.85);
    }
    .detail-hero::after {
      content: '';
      position: absolute;
      bottom: 0;
      left: 0;
      width: 100%;
      height: 100px;
      background: linear-gradient(to top, #f8f5f0, transparent);
    }
    .detail-content {
      max-width: 900px;
      margin: -60px auto 0;
      padding: 40px;
      position: relative;
      z-index: 1;
    }
    h1 {
      font-family: "Noto Serif TC", "Microsoft JhengHei", serif;
      font-size: 2.8rem;
      color: #D4A03C;
      margin-bottom: 30px;
      text-align: center;
    }
    .info-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 20px;
      margin-bottom: 40px;
    }
    .info-box {
      background: #fff;
      padding: 20px;
      border-radius: 12px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.08);
      border-left: 4px solid #D4A03C;
    }
    .info-box label {
      display: block;
      font-size: 0.85rem;
      color: #888;
      margin-bottom: 6px;
      text-transform: uppercase;
      letter-spacing: 1px;
    }
    .info-box p {
      font-size: 1.2rem;
      font-weight: 500;
      color: #333;
    }
    .description {
      background: #fff;
      padding: 40px;
      border-radius: 16px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.08);
    }
    .description h3 {
      font-family: "Noto Serif TC", serif;
      font-size: 1.6rem;
      color: #D4A03C;
      margin-bottom: 20px;
      padding-bottom: 15px;
      border-bottom: 2px solid #f0e6d3;
    }
    .description p {
      font-size: 1.1rem;
      color: #555;
      line-height: 1.8;
    }
    .back-btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 30px;
      padding: 12px 24px;
      background: #D4A03C;
      color: #fff;
      text-decoration: none;
      border-radius: 8px;
      font-weight: 500;
      transition: all 0.3s;
    }
    .back-btn:hover {
      background: #c4922e;
      transform: translateX(-4px);
    }
    .tag {
      display: inline-block;
      padding: 6px 16px;
      background: linear-gradient(135deg, #D4A03C, #E8C56D);
      color: #fff;
      border-radius: 20px;
      font-size: 0.9rem;
      font-weight: 500;
      margin-bottom: 20px;
    }
    @media (max-width: 768px) {
      .detail-hero {
        height: 45vh;
        min-height: 300px;
      }
      .detail-content {
        margin: -40px 20px 0;
        padding: 30px 20px;
      }
      h1 {
        font-size: 2rem;
      }
      .info-grid {
        grid-template-columns: 1fr;
      }
      .description {
        padding: 25px;
      }
    }
  </style>
</head>
<body>
  <section class="detail-hero">
    <div class="detail-hero-bg" style="background-image: url('https://images.unsplash.com/photo-1563245372-f21724e3856d?w=1600&q=80');"></div>
  </section>
  <section class="detail-content">
    <a href="index.html" class="back-btn">← 返回首頁</a>
    <span class="tag">北京必吃經典</span>
    <h1>北京烤鴨</h1>
    <div class="info-grid">
      <div class="info-box"><label>營業時間</label><p>11:00-13:30, 17:00-19:30</p></div>
      <div class="info-box"><label>價位</label><p>¥150-200</p></div>
      <div class="info-box"><label>地址</label><p>東城區帥府園路1號</p></div>
      <div class="info-box"><label>評分</label><p>⭐ 4.5</p></div>
    </div>
    <div class="description">
      <h3>關於北京烤鴨</h3>
      <p>北京烤鴨是北京最具代表性的美食，擁有六百多年歷史。最著名的「全聚德」創於1864年，以傳統果木掛爐烤製聞名。烤鴨以北京填鴨為原料，經過空氣注射、烤製等工藝，皮脆肉嫩，配以蔥段、黃瓜條、甜麵醬，用薄餅包覆食用，香氣四溢，是到北京必嘗的經典美味。</p>
    </div>
  </section>
</body>
</html>
